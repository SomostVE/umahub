<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UmaHub</title>

  <style>
    :root{
      --bg-img-desktop: url("https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3224770/header.jpg?t=1765520190");
      --bg-img-mobile:  url("https://umamusume.com/_app/immutable/assets/kv.95F8Qc_S.png");
      --bg-img: var(--bg-img-desktop);

      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);

      --glass:  rgba(255,255,255,.12);
      --glass2: rgba(255,255,255,.09);
      --hover:  rgba(255,255,255,.16);

      --shadow: 0 14px 40px rgba(0,0,0,.38);
      --radius: 18px;

      --maxw: 100%;
      --sidebar-w: 280px;
      --page-pad: 22px;
    }

    @media (max-width: 720px){
      :root{ --bg-img: var(--bg-img-mobile); --page-pad: 14px; }
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background-image: var(--bg-img);
      background-size: cover;
      background-position: center;
      filter: blur(6px) saturate(1.12) brightness(1.05);
      transform: scale(1.02);
      z-index: -2;
    }

    body::after{
      content:"";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(0,0,0,.14), transparent 60%),
        radial-gradient(900px 600px at 80% 10%, rgba(0,0,0,.12), transparent 55%),
        linear-gradient(to bottom, rgba(0,0,0,.30), rgba(0,0,0,.48));
      z-index: -1;
    }

    header{
      max-width: var(--maxw);
      margin: 14px auto 6px;
      padding: 0 var(--page-pad);
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Desktop: title left on same line as search */
    .topbar{
      width: 100%;
      display:flex;
      align-items:center;
      gap: 14px;
      justify-content: center;
    }

    h1{
      margin:0;
      font-size: 18px;
      letter-spacing: .2px;
      text-shadow: 0 10px 22px rgba(0,0,0,.26);
      white-space: nowrap;
    }

    .search-wrap{
      flex: 1 1 auto;
      display:flex;
      justify-content:center;
    }

    .search{
      width: min(820px, 100%);
      padding: 12px 14px;
      border-radius: 16px;
      border: none;
      outline: none;
      color: var(--text);
      background: var(--glass2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .search::placeholder{ color: rgba(255,255,255,.58); }

    /* Mobile: keep centered stack */
    @media (max-width: 720px){
      header{ gap: 10px; }
      .topbar{
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .search-wrap{ width: 100%; }
      .search{ width: 100%; }
    }

    main{
      max-width: var(--maxw);
      margin: 8px auto 34px;
      padding: 0 var(--page-pad);
    }

    .layout{
      display:grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 980px){
      .layout{ grid-template-columns: 1fr; gap: 14px; }
    }

    aside.sidebar{
      position: sticky;
      top: 12px;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    @media (max-width: 980px){
      aside.sidebar{ position: static; }
    }

    .sidebar h2{
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(255,255,255,.86);
    }

    .filter-group{
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.16);
    }

    .filter-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom: 6px;
    }

    .filter-label{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      margin-top: 8px;
      cursor: pointer;
      user-select: none;
    }

    .filter-label:hover{
      background: rgba(255,255,255,.11);
    }

    .filter-label input[type="checkbox"]{
      appearance:none;
      -webkit-appearance:none;
      width:18px;
      height:18px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,.68);
      background: rgba(0,0,0,.18);
      display:grid;
      place-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.10),
        0 8px 20px rgba(0,0,0,.22);
      flex: 0 0 auto;
    }
    .filter-label input[type="checkbox"]::before{
      content:"";
      width: 10px;
      height: 10px;
      border-radius: 3px;
      transform: scale(0);
      transition: transform .10s ease;
      background: rgba(255,255,255,.92);
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
    .filter-label input[type="checkbox"]:checked::before{
      transform: scale(1);
    }

    .filter-meta{
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .link-btn{
      appearance:none;
      border:none;
      background: transparent;
      color: rgba(255,255,255,.82);
      text-decoration: underline;
      cursor:pointer;
      padding: 0;
      font-size: 12px;
      white-space: nowrap;
    }
    .link-btn:hover{ color: rgba(255,255,255,.95); }

    .section{ margin-top: 10px; }

    .section-head{
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 4px 8px;
    }

    .section-title{
      margin:0;
      font-size: 13px;
      font-weight: 750;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);
      text-shadow: 0 10px 22px rgba(0,0,0,.22);
    }

    .section-sub{
      margin:0;
      font-size: 12px;
      color: var(--muted);
    }

    .divider{
      height: 1px;
      background: rgba(255,255,255,.16);
      margin: 8px 4px 12px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: start;
      justify-content: start;
    }

    @media (max-width: 520px){
      .grid{
        grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
        gap: 12px;
      }
    }

    .tile{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-width: 380px;
      justify-self: start;
      width: 100%;
    }

    .main-btn{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding: 16px 14px;
      border-radius: var(--radius);
      text-decoration:none;
      color: var(--text);

      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      transition: transform .10s ease, background .12s ease;
    }

    .main-btn:hover{
      background: var(--hover);
      transform: translateY(-1px);
    }

    .icon{
      width:64px;
      height:64px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.11);
      overflow:hidden;
    }

    .icon img{
      width: 72%;
      height: 72%;
      object-fit: contain;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.24));
    }

    .name{
      font-size: 14px;
      font-weight: 650;
      text-align:center;
      line-height: 1.2;
    }

    .quick{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
    }

    .quick a{
      display:block;
      text-align:center;
      font-size:12px;
      padding: 8px 8px;
      border-radius: 12px;
      text-decoration:none;
      color: var(--text);

      background: rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition: background .12s ease, transform .10s ease;
    }

    .quick a:hover{
      background: rgba(255,255,255,.15);
      transform: translateY(-1px);
    }

    @media (max-width: 520px){
      .quick{ grid-template-columns: repeat(2, 1fr); }
      .quick a{
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        font-size: 11px;
        line-height: 1.1;
        padding: 8px 6px;
      }
    }

    .empty{
      margin: 6px 4px 0;
      padding: 14px 16px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.07);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <h1>UmaHub</h1>
      <div class="search-wrap">
        <input id="q" class="search" type="search" placeholder="Rechercher (site, tag, lien)..." autocomplete="off" />
      </div>
    </div>
  </header>

  <main>
    <div class="layout">
      <aside class="sidebar" aria-label="Filtres">
        <h2>Filtres</h2>

        <div class="filter-group" aria-label="Mode">
          <div class="filter-title">Mode</div>

          <label class="filter-label">
            <input id="new-player" type="checkbox" />
            <span>Nouveau joueur</span>
          </label>
        </div>

        <div class="filter-group" aria-label="Filtre par langue">
          <div class="filter-title">Langue</div>

          <label class="filter-label">
            <input id="lang-en" type="checkbox" checked />
            <span>Anglais</span>
          </label>

          <label class="filter-label">
            <input id="lang-jp" type="checkbox" checked />
            <span>Japonais</span>
          </label>

          <div class="filter-meta">
            <span id="filter-status">Toutes les langues</span>
            <button id="reset-filters" class="link-btn" type="button">Réinitialiser</button>
          </div>
        </div>
      </aside>

      <div id="content" aria-label="Contenu"></div>
    </div>
  </main>

  <script>
    const RESOURCES = [
      { category:"youtube", lang:"en", beginner:true, name:"Beginner's Sparks Guide", homeUrl:"https://youtu.be/CNrEIuwOde4?si=-rsjHCaBr3glvruU", tags:["youtube","beginner","sparks","guide","en"], note:"Guide débutant sur les Sparks.", quick:[] },
      { category:"youtube", lang:"en", beginner:true, name:"Acceleration Skills Explained", homeUrl:"https://youtu.be/lXA_hf2HsYU?si=4vCJvGDfnb7fFyEz", tags:["youtube","beginner","skills","acceleration","en"], note:"Différences entre les skills d'accélération.", quick:[] },
      { category:"youtube", lang:"en", beginner:true, name:"1M Points FAST (Story Event)", homeUrl:"https://youtu.be/0D7VlpgWTGM?si=cjLH5lbLYYyJinjE", tags:["youtube","beginner","event","points","farm","en"], note:"Optimisation des points en Story Event.", quick:[] },

      { category:"sites", lang:"en", beginner:true, name:"Gametora", homeUrl:"https://gametora.com/umamusume", tags:["anglais","en","global","guides","tiers","meta","build"], note:'Incontournable. Pense à choisir "Global" dans les paramètres.', quick:[
        { label:"FAQ", url:"https://gametora.com/umamusume/guides/new-player-faq" },
        { label:"Uma", url:"https://gametora.com/umamusume/characters" },
        { label:"Cartes", url:"https://gametora.com/umamusume/supports" },
      ]},
      { category:"sites", lang:"en", beginner:true, name:"Umamusu Wiki", homeUrl:"https://umamusu.wiki/Main_Page", tags:["anglais","en","wiki","database","guides"], quick:[
        { label:"Uma", url:"https://umamusu.wiki/List_of_Characters" },
        { label:"Cartes", url:"https://umamusu.wiki/Game:List_of_Support_Cards" },
        { label:"Guide", url:"https://umamusu.wiki/Game:New_Player_Guide" },
      ]},
      { category:"sites", lang:"en", name:"Race Simulator (Umalator)", homeUrl:"https://alpha123.github.io/uma-tools/umalator-global/#H4sIAAAAAAAACtWPTWrDMBCF7%2FLWWshuG4J2WZZuClmWLIQ1dkUsyWhGmBJ89zJJSmlu0N33huH9XDCUVpleA1xne%2FtkkNmnZSaGe7HWoDG9F34jWuCkNjKofqBAI9wFqZQA1xtMtbSsHgYrefmkemUmzyVfUWKi%2B6sPpGl2M2jJd2pUmoxRtAU6a3e2gwEvRGrZaw0Wn2L2P3Ipq0bslacmDPesuEYOJd0FS%2FVC0xccjpTPpcEgRBafBzosEqVpDxw1qtXR%2F7ke8GvweD7HeWa4D61qdx1OtyH9w5D%2FMOG0bd8LhbFRAwIAAA%3D%3D", tags:["anglais","en","simulateur","race","compare","global","tools"], note:"Simulateur de course + comparaison d'Uma.", quick:[] },
      { category:"sites", lang:"en", name:"Uma Musume DB (Pure DB)", homeUrl:"https://uma-global.pure-db.com/#/search", tags:["anglais","en","database","friends","supports","global"], note:"Recherche d'amis selon cartes / Uma.", quick:[] },
      { category:"sites", lang:"en", name:"Chronogenesis", homeUrl:"https://chronogenesis.net/", tags:["anglais","en","friends","supports","club","stats","search","global"], note:"Recherche avancée (amis/supports) + stats de clubs.", quick:[] },

      { category:"sites", lang:"jp", beginner:true, name:"Kamigame (Global)", homeUrl:"https://kamigame.jp/umamusume/page/380240391003208403.html", tags:["japonais","jp","global","guides","tiers"], note:"Site japonais avec une page Global.", quick:[] },
      { category:"sites", lang:"jp", name:"UmaSim (mee1080)", homeUrl:"https://mee1080.github.io/umasim/", tags:["japonais","jp","simulateur","training","tools"], quick:[
        { label:"Race", url:"https://mee1080.github.io/umasim/race/" }
      ]},
      { category:"sites", lang:"jp", beginner:true, name:"GameWith", homeUrl:"https://gamewith.jp/uma-musume", tags:["japonais","jp","guides","wiki"], quick:[] },
      { category:"sites", lang:"jp", name:"攻略.tools", homeUrl:"https://ウマ娘.攻略.tools", tags:["japonais","jp","tools","rankings"], quick:[
        { label:"Succession", url:"https://ウマ娘.攻略.tools/characters/rankings/succession/total" }
      ]},
      { category:"sites", lang:"jp", beginner:true, name:"Game8", homeUrl:"https://game8.jp/umamusume", tags:["japonais","jp","guides","wiki"], quick:[] },

      { category:"docs", lang:"en", beginner:true, name:"Document reference", homeUrl:"https://docs.google.com/document/d/11X2P7pLuh-k9E7PhRiD20nDX22rNWtCpC1S4IMx_8pQ/edit?tab=t.0#heading=h.fgy5q162l0r4", tags:["wiki","strategy","event","document","google","doc","en"], quick:[] },
      { category:"docs", lang:"en", beginner:true, name:"Skills Spreadsheet", homeUrl:"https://docs.google.com/spreadsheets/d/1oB3eTvKqREtJDWJL0q80O_VjBcpOmRl5xE0z5fZKgFY/edit?usp=drivesdk", tags:["google","sheet","skills","spreadsheet","en"], quick:[] },
      { category:"docs", lang:"en", beginner:false, name:"Prochaines sorties", homeUrl:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1bJUx-NQHJvwYE3Jcs9UP5aFVdWwoPVZc5Z7GN3oUGyB7-Rl8YZ48y-lJEvFWTGIrQmOa-yTehPkK/pubhtml", tags:["google","sheet","release","timeline","en"], quick:[] },
      { category:"docs", lang:"en", beginner:true, name:"Explication Support Card", homeUrl:"https://docs.google.com/document/d/1iUV8pAc5-eXePJJA8hhgeJA6KjuCczjf68ZxdzYY4tM/edit?tab=t.0#heading=h.eov9wixpwcwm", tags:["google","doc","support","cards","en"], quick:[] },
      { category:"docs", lang:"en", beginner:true, name:"Score Support Card", homeUrl:"https://docs.google.com/spreadsheets/d/17nbTcHUPqq8O6h_4Z6cVXwfkgEbpgO1VHzdLf-3YSfw/edit?gid=1776774504#gid=1776774504", tags:["google","sheet","score","support","cards","en"], quick:[] },
      { category:"docs", lang:"en", beginner:true, name:"Simulateur de rangs", homeUrl:"https://docs.google.com/spreadsheets/d/1AAZCVDMiCozDNKte-5JYSm7SWUeVJ0o87i1iDY1bnWM/edit?gid=1776456574#gid=1776456574", tags:["google","sheet","rank","simulator","en"], quick:[] },
      { category:"docs", lang:"en", beginner:true, name:"Explication Champion Meeting", homeUrl:"https://docs.google.com/document/d/15Ihvk2BuhoLbQDNyCPOcvgxSzuj-cL16g8V5ZgM_HeA/edit?tab=t.bdzdrqctyeyd", tags:["google","doc","champion","meeting","en"], quick:[] },
    ];

    const content = document.getElementById("content");
    const q = document.getElementById("q");

    const newPlayer = document.getElementById("new-player");
    const langEn = document.getElementById("lang-en");
    const langJp = document.getElementById("lang-jp");
    const resetBtn = document.getElementById("reset-filters");
    const filterStatus = document.getElementById("filter-status");

    function safeUrl(u){ try { return new URL(u).toString(); } catch { return null; } }
    function hostFromUrl(u){ try { return new URL(u).hostname; } catch { return null; } }

    function googleFavicon(host, size=128){
      return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=${size}`;
    }
    function ddgFavicon(host){
      return `https://icons.duckduckgo.com/ip3/${encodeURIComponent(host)}.ico`;
    }

    function resolveIcon(item){
      if (item.icon) return item.icon;
      const host = hostFromUrl(item.homeUrl);
      return host ? googleFavicon(host, 128) : "";
    }

    function normalizeTags(tags){
      if (!Array.isArray(tags)) return [];
      return tags.map(t => String(t || "").trim().toLowerCase()).filter(Boolean);
    }

    function getActiveLangs(){
      const active = new Set();
      if (langEn.checked) active.add("en");
      if (langJp.checked) active.add("jp");
      return active;
    }

    function updateFilterStatus(){
      const active = getActiveLangs();
      const langText =
        active.size === 2 ? "Toutes les langues" :
        active.size === 0 ? "Aucune langue" :
        active.has("en") ? "Anglais" : "Japonais";

      filterStatus.textContent = newPlayer.checked
        ? `${langText} · Nouveau joueur`
        : langText;
    }

    function langAllowed(item, activeLangs){
      const lang = (item.lang || "en").toLowerCase();
      return activeLangs.has(lang);
    }

    function beginnerAllowed(item){
      if (!newPlayer.checked) return true;
      return item.beginner === true;
    }

    function matches(item, term){
      const t = term.trim().toLowerCase();
      if (!t) return true;

      const nameMatch = (item.name || "").toLowerCase().includes(t);
      const urlMatch = (item.homeUrl || "").toLowerCase().includes(t);

      const quickMatch = (item.quick || []).some(l => {
        const label = (l.label || "").toLowerCase();
        const url = (l.url || "").toLowerCase();
        return label.includes(t) || url.includes(t);
      });

      const tagsMatch = normalizeTags(item.tags).some(tag => tag.includes(t));
      return nameMatch || urlMatch || quickMatch || tagsMatch;
    }

    function getCategories(){
      return newPlayer.checked
        ? [
            { key: "youtube", title: "YouTube",   subtitle: "Vidéos pour bien démarrer" },
            { key: "sites",   title: "Sites",     subtitle: "Guides essentiels" },
            { key: "docs",    title: "Documents", subtitle: "Feuilles utiles" },
          ]
        : [
            { key: "sites",   title: "Sites",     subtitle: "Guides, wikis, tools" },
            { key: "docs",    title: "Documents", subtitle: "Google Sheets / Docs" },
            { key: "youtube", title: "YouTube",   subtitle: "Vidéos & chaînes" },
          ];
    }

    function render(term=""){
      content.innerHTML = "";
      const activeLangs = getActiveLangs();
      const categories = getCategories();

      for (const cat of categories){
        const items = RESOURCES
          .filter(r => r.category === cat.key)
          .filter(r => beginnerAllowed(r))
          .filter(r => langAllowed(r, activeLangs))
          .filter(r => matches(r, term));

        const section = document.createElement("section");
        section.className = "section";
        section.setAttribute("data-category", cat.key);

        const head = document.createElement("div");
        head.className = "section-head";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = cat.title;

        const sub = document.createElement("p");
        sub.className = "section-sub";
        sub.textContent = items.length ? `${items.length} lien(s)` : cat.subtitle;

        head.appendChild(title);
        head.appendChild(sub);

        const divider = document.createElement("div");
        divider.className = "divider";

        section.appendChild(head);
        section.appendChild(divider);

        if (!items.length){
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Aucun résultat dans cette section.";
          section.appendChild(empty);
          content.appendChild(section);
          continue;
        }

        const grid = document.createElement("div");
        grid.className = "grid";

        for (const item of items){
          const home = safeUrl(item.homeUrl);
          if (!home) continue;

          const tile = document.createElement("article");
          tile.className = "tile";

          const main = document.createElement("a");
          main.className = "main-btn";
          main.href = home;
          main.target = "_blank";
          main.rel = "noopener noreferrer";
          if (item.note) main.title = item.note;

          const icon = document.createElement("div");
          icon.className = "icon";

          const img = document.createElement("img");
          img.alt = `${item.name} icon`;
          img.loading = "lazy";
          img.src = resolveIcon(item);

          img.onerror = () => {
            if (img.dataset.fallbackDone === "1") { img.style.display = "none"; return; }
            const host = hostFromUrl(item.homeUrl);
            if (!host) { img.style.display = "none"; return; }
            img.dataset.fallbackDone = "1";
            img.src = ddgFavicon(host);
          };

          icon.appendChild(img);

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = item.name;

          main.appendChild(icon);
          main.appendChild(name);
          tile.appendChild(main);

          const quickLinks = (item.quick || [])
            .filter(x => safeUrl(x.url))
            .slice(0, 3);

          if (quickLinks.length){
            const quick = document.createElement("div");
            quick.className = "quick";

            for (const l of quickLinks){
              const a = document.createElement("a");
              a.textContent = l.label || "Lien";
              a.href = safeUrl(l.url);
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              quick.appendChild(a);
            }
            tile.appendChild(quick);
          }

          grid.appendChild(tile);
        }

        section.appendChild(grid);
        content.appendChild(section);
      }
    }

    function rerender(){
      updateFilterStatus();
      render(q.value);
    }

    q.addEventListener("input", rerender);
    newPlayer.addEventListener("change", rerender);
    langEn.addEventListener("change", rerender);
    langJp.addEventListener("change", rerender);

    resetBtn.addEventListener("click", () => {
      newPlayer.checked = false;
      langEn.checked = true;
      langJp.checked = true;
      q.value = "";
      rerender();
      q.focus();
    });

    rerender();
  </script>
</body>
</html>
